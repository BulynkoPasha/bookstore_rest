version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bookstore-db
    environment:
      POSTGRES_DB: bookstore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bookstore_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  bookstore_data: