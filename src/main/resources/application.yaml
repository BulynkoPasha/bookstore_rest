spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bookstore_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/migration/db.changelog-master.yaml
    enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Почта
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-mail@gmail.com}
    password: ${MAIL_PASSWORD:your-pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# URL фронтенда — для ссылки в письме
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_USERNAME:your-mail@gmail.com}

# JWT настройки
jwt:
  secret: ${JWT_SECRET:your-super-secret-key-minimum-256-bits-long-change-in-production}
  expiration: 86400000        # 24 часа
  refresh-expiration: 604800000 # 7 дней

# Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Логирование
logging:
  level:
    com.bookstore: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# Dev профиль
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
# Prod профиль
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    com.bookstore: INFO